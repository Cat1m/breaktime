<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sipping — Keep sipping, stay hydrated</title>
  <meta name="description" content="A gentle break reminder app that helps you stay hydrated and healthy. Free, open-source, cross-platform.">
  <meta property="og:title" content="Sipping — Break Reminder & Hydration App">
  <meta property="og:description" content="Fullscreen break overlays, custom sounds, idle detection. Free & open-source.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cat1m.github.io/breaktime">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #818cf8;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--primary-hover); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* Lang toggle */
    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .lang-toggle:hover { border-color: var(--text-muted); color: var(--text); }

    /* Hero */
    .hero { text-align: center; padding: 80px 0 60px; }
    .hero-icon { font-size: 64px; margin-bottom: 16px; display: block; }
    .hero h1 { font-size: 48px; font-weight: 700; letter-spacing: -1px; margin-bottom: 8px; }
    .hero .tagline { font-size: 20px; color: var(--text-muted); margin-bottom: 24px; }
    .hero .description { font-size: 16px; color: var(--text-muted); max-width: 520px; margin: 0 auto 36px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px; border-radius: 10px; font-size: 16px;
      font-weight: 600; border: none; cursor: pointer;
      transition: all 0.2s; text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover {
      background: var(--primary-hover); text-decoration: none;
      transform: translateY(-1px); box-shadow: 0 4px 24px rgba(99, 102, 241, 0.3);
    }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 10px 20px; font-size: 14px; }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); text-decoration: none; }
    .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; }

    .download-group { margin-bottom: 16px; }
    .os-label { font-size: 13px; color: var(--text-muted); margin-top: 12px; }

    .trust-note {
      margin-top: 20px; padding: 14px 20px;
      background: rgba(234, 179, 8, 0.08); border: 1px solid rgba(234, 179, 8, 0.2);
      border-radius: 10px; font-size: 13px; color: #d4a017;
      line-height: 1.6; max-width: 480px; margin-left: auto; margin-right: auto; text-align: left;
    }
    .trust-note summary { cursor: pointer; font-weight: 600; text-align: center; list-style: none; }
    .trust-note summary::-webkit-details-marker { display: none; }
    .trust-note .steps { margin-top: 10px; color: var(--text-muted); }
    .trust-note .steps strong { color: var(--text); }

    .other-toggle {
      color: var(--text-muted); font-size: 14px; cursor: pointer;
      background: none; border: none; margin-top: 12px; font-family: inherit;
    }
    .other-toggle:hover { color: var(--text); }

    .other-platforms { display: none; margin-top: 20px; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .other-platforms.show { display: flex; }

    /* Screenshots */
    .screenshots { padding: 60px 0; border-top: 1px solid var(--border); }
    .screenshots h2 { text-align: center; font-size: 28px; margin-bottom: 32px; }
    .screenshots-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;
    }
    .screenshots-grid img {
      width: 100%; border-radius: 10px; border: 1px solid var(--border);
      cursor: pointer; transition: transform 0.2s;
    }
    .screenshots-grid img:hover { transform: scale(1.02); }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

    /* Features */
    .features { padding: 60px 0; border-top: 1px solid var(--border); }
    .features h2 { text-align: center; font-size: 28px; margin-bottom: 40px; }
    .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .feature-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
    }
    .feature-card .icon { font-size: 28px; margin-bottom: 12px; display: block; }
    .feature-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .feature-card p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 40px 0; text-align: center; }
    .footer-links { display: flex; gap: 24px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
    .footer-links a { color: var(--text-muted); font-size: 14px; }
    .footer-links a:hover { color: var(--text); }
    .footer-tagline { font-size: 13px; color: var(--text-muted); font-style: italic; }

    @media (max-width: 640px) {
      .hero { padding: 48px 0 40px; }
      .hero h1 { font-size: 32px; }
      .hero .tagline { font-size: 17px; }
      .features-grid, .screenshots-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">🇻🇳 Tiếng Việt</button>

  <!-- Hero -->
  <section class="hero">
    <div class="container">
      <span class="hero-icon">💧</span>
      <h1>Sipping</h1>
      <p class="tagline" data-i18n="tagline"></p>
      <p class="description" data-i18n="description"></p>

      <div class="download-group">
        <a id="main-download" class="btn btn-primary" href="#">
          <span>⬇</span>
          <span id="dl-text"></span>
        </a>
        <p class="os-label" id="os-label"></p>
      </div>

      <button class="other-toggle" onclick="toggleOther()" data-i18n="allPlatforms"></button>

      <div class="other-platforms" id="other-platforms">
        <a class="btn btn-ghost btn-sm" href="https://github.com/Cat1m/breaktime/releases/download/v0.1.0/Sipping_0.1.0_x64-setup.exe">Windows (.exe)</a>
        <a class="btn btn-ghost btn-sm" href="https://github.com/Cat1m/breaktime/releases/download/v0.1.0/Sipping_0.1.0_x64_en-US.msi">Windows (.msi)</a>
        <a class="btn btn-ghost btn-sm" href="https://github.com/Cat1m/breaktime/releases/download/v0.1.0/Sipping_0.1.0_aarch64.dmg">macOS (Apple Silicon)</a>
        <a class="btn btn-ghost btn-sm" href="https://github.com/Cat1m/breaktime/releases/download/v0.1.0/Sipping_0.1.0_x64.dmg">macOS (Intel)</a>
        <a class="btn btn-ghost btn-sm" href="https://github.com/Cat1m/breaktime/releases/download/v0.1.0/Sipping_0.1.0_amd64.AppImage">Linux (.AppImage)</a>
        <a class="btn btn-ghost btn-sm" href="https://github.com/Cat1m/breaktime/releases/download/v0.1.0/Sipping_0.1.0_amd64.deb">Linux (.deb)</a>
        <a class="btn btn-ghost btn-sm" href="https://github.com/Cat1m/breaktime/releases/download/v0.1.0/Sipping-0.1.0-1.x86_64.rpm">Linux (.rpm)</a>
      </div>

      <details class="trust-note">
        <summary data-i18n="trustTitle"></summary>
        <div class="steps" id="trust-steps"></div>
      </details>
    </div>
  </section>

  <!-- Screenshots -->
  <section class="screenshots">
    <div class="container">
      <h2 data-i18n="screenshotsTitle"></h2>
      <div class="screenshots-grid">
        <img src="images/screenshot_1.jpg" alt="Sipping Settings" onclick="openLightbox(this.src)" loading="lazy">
        <img src="images/screenshot_2.jpg" alt="Sipping Break Overlay" onclick="openLightbox(this.src)" loading="lazy">
        <img src="images/screenshot_3.png" alt="Sipping Timer" onclick="openLightbox(this.src)" loading="lazy">
        <img src="images/screenshot_4.png" alt="Sipping Custom Sound" onclick="openLightbox(this.src)" loading="lazy">
      </div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="">
  </div>

  <!-- Features -->
  <section class="features">
    <div class="container">
      <h2 data-i18n="featuresTitle"></h2>
      <div class="features-grid">
        <div class="feature-card">
          <span class="icon">🖥️</span>
          <h3 data-i18n="f1Title"></h3>
          <p data-i18n="f1Desc"></p>
        </div>
        <div class="feature-card">
          <span class="icon">🎵</span>
          <h3 data-i18n="f2Title"></h3>
          <p data-i18n="f2Desc"></p>
        </div>
        <div class="feature-card">
          <span class="icon">💤</span>
          <h3 data-i18n="f3Title"></h3>
          <p data-i18n="f3Desc"></p>
        </div>
        <div class="feature-card">
          <span class="icon">🌐</span>
          <h3 data-i18n="f4Title"></h3>
          <p data-i18n="f4Desc"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="https://github.com/Cat1m/breaktime">GitHub</a>
        <a href="https://ko-fi.com/minhchienle">Ko-fi</a>
        <a href="https://paypal.me/ArcaRyze">PayPal</a>
      </div>
      <p class="footer-tagline" data-i18n="footerTagline"></p>
    </div>
  </footer>

  <script>
    // ── i18n ──
    const STRINGS = {
      en: {
        tagline: 'Keep sipping, stay hydrated',
        description: 'A gentle break reminder that shows fullscreen overlays when it\'s time to rest. Custom sounds, background images, idle detection \u2014 simple and distraction-free.',
        allPlatforms: 'All platforms \u25BE',
        trustTitle: '\u26A0 Windows or macOS showing a warning?',
        trustSteps: 'Sipping is open-source and free, but not yet code-signed \u2014 so your OS may show a security warning. This is normal for new indie apps.<br><br><strong>Windows:</strong> Click "More info" \u2192 "Run anyway"<br><strong>macOS:</strong> Right-click the app \u2192 "Open" \u2192 "Open" again<br><br>You can <a href="https://github.com/Cat1m/breaktime">inspect the source code</a> anytime.',
        screenshotsTitle: 'See it in action',
        featuresTitle: 'Simple by design',
        f1Title: 'Fullscreen overlays',
        f1Desc: 'Covers all your monitors with a calming break screen. No tiny popups you can ignore.',
        f2Title: 'Custom sounds & images',
        f2Desc: 'Pick your own notification sound (MP3, OGG, WAV, FLAC) and background image.',
        f3Title: 'Smart detection',
        f3Desc: 'Auto-pauses when you\'re idle or Do Not Disturb is on. No interruptions during focus time.',
        f4Title: 'Cross-platform',
        f4Desc: 'Windows, macOS, and Linux. Lightweight, runs in system tray. English & Vietnamese.',
        footerTagline: 'Made with caffeine by a developer who transforms coffee into apps.',
        detected: 'Detected: ',
        langBtn: '\uD83C\uDDFB\uD83C\uDDF3 Ti\u1EBFng Vi\u1EC7t',
      },
      vi: {
        tagline: 'U\u1ED1ng n\u01B0\u1EDBc \u0111i, gi\u1EEF s\u1EE9c kh\u1ECFe nha',
        description: 'M\u1ED9t \u1EE9ng d\u1EE5ng nh\u1EAFc ngh\u1EC9 ng\u01A1i nh\u1EB9 nh\u00E0ng v\u1EDBi m\u00E0n h\u00ECnh to\u00E0n m\u00E0n h\u00ECnh. T\u00F9y ch\u1EC9nh \u00E2m thanh, h\u00ECnh n\u1EC1n, t\u1EF1 \u0111\u1ED9ng d\u1EEBng khi kh\u00F4ng d\u00F9ng m\u00E1y \u2014 \u0111\u01A1n gi\u1EA3n v\u00E0 kh\u00F4ng l\u00E0m phi\u1EC1n.',
        allPlatforms: 'T\u1EA5t c\u1EA3 n\u1EC1n t\u1EA3ng \u25BE',
        trustTitle: '\u26A0 Windows ho\u1EB7c macOS hi\u1EC7n c\u1EA3nh b\u00E1o?',
        trustSteps: 'Sipping l\u00E0 m\u00E3 ngu\u1ED3n m\u1EDF v\u00E0 mi\u1EC5n ph\u00ED, nh\u01B0ng ch\u01B0a c\u00F3 ch\u1EEF k\u00FD s\u1ED1 \u2014 n\u00EAn h\u1EC7 \u0111i\u1EC1u h\u00E0nh c\u00F3 th\u1EC3 hi\u1EC7n c\u1EA3nh b\u00E1o. \u0110i\u1EC1u n\u00E0y b\u00ECnh th\u01B0\u1EDDng v\u1EDBi app m\u1EDBi.<br><br><strong>Windows:</strong> Nh\u1EA5n "More info" \u2192 "Run anyway"<br><strong>macOS:</strong> Chu\u1ED9t ph\u1EA3i v\u00E0o app \u2192 "Open" \u2192 "Open" l\u1EA7n n\u1EEFa<br><br>B\u1EA1n c\u00F3 th\u1EC3 <a href="https://github.com/Cat1m/breaktime">xem m\u00E3 ngu\u1ED3n</a> b\u1EA5t c\u1EE9 l\u00FAc n\u00E0o.',
        screenshotsTitle: 'Xem th\u1EED nh\u00E9',
        featuresTitle: '\u0110\u01A1n gi\u1EA3n l\u00E0 ti\u00EAu ch\u00ED',
        f1Title: 'M\u00E0n h\u00ECnh ngh\u1EC9 to\u00E0n m\u00E0n h\u00ECnh',
        f1Desc: 'Ph\u1EE7 k\u00EDn m\u1ECDi m\u00E0n h\u00ECnh v\u1EDBi giao di\u1EC7n ngh\u1EC9 ng\u01A1i d\u1EC5 ch\u1ECBu. Kh\u00F4ng ph\u1EA3i popup nh\u1ECF x\u00EDu d\u1EC5 b\u1ECF qua.',
        f2Title: '\u00C2m thanh & h\u00ECnh n\u1EC1n t\u00F9y ch\u1EC9nh',
        f2Desc: 'Ch\u1ECDn \u00E2m thanh th\u00F4ng b\u00E1o (MP3, OGG, WAV, FLAC) v\u00E0 h\u00ECnh n\u1EC1n theo \u00FD b\u1EA1n.',
        f3Title: 'Nh\u1EADn di\u1EC7n th\u00F4ng minh',
        f3Desc: 'T\u1EF1 \u0111\u1ED9ng d\u1EEBng khi b\u1EA1n kh\u00F4ng d\u00F9ng m\u00E1y ho\u1EB7c b\u1EADt Kh\u00F4ng l\u00E0m phi\u1EC1n. Kh\u00F4ng g\u00E2y phi\u1EC1n khi \u0111ang t\u1EADp trung.',
        f4Title: '\u0110a n\u1EC1n t\u1EA3ng',
        f4Desc: 'Windows, macOS v\u00E0 Linux. Nh\u1EB9, ch\u1EA1y trong khay h\u1EC7 th\u1ED1ng. H\u1ED7 tr\u1EE3 ti\u1EBFng Anh & ti\u1EBFng Vi\u1EC7t.',
        footerTagline: '\u0110\u01B0\u1EE3c l\u00E0m b\u1EB1ng c\u00E0 ph\u00EA b\u1EDFi m\u1ED9t l\u1EADp tr\u00ECnh vi\u00EAn bi\u1EBFn caffeine th\u00E0nh \u1EE9ng d\u1EE5ng.',
        detected: 'Ph\u00E1t hi\u1EC7n: ',
        langBtn: '\uD83C\uDDEC\uD83C\uDDE7 English',
      }
    };

    let lang = localStorage.getItem('sipping-lang') || (navigator.language.startsWith('vi') ? 'vi' : 'en');

    function applyLang() {
      const s = STRINGS[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (s[key]) el.textContent = s[key];
      });
      // HTML content (trust steps)
      document.getElementById('trust-steps').innerHTML = s.trustSteps;
      // Lang toggle button
      document.getElementById('lang-toggle').textContent = s.langBtn;
      // Download button + OS label
      applyDownload();
      document.documentElement.lang = lang;
      localStorage.setItem('sipping-lang', lang);
    }

    function toggleLang() {
      lang = lang === 'en' ? 'vi' : 'en';
      applyLang();
    }

    // ── Download detection ──
    const BASE = 'https://github.com/Cat1m/breaktime/releases/download/v0.1.0/';
    const DOWNLOADS = {
      windows: { file: 'Sipping_0.1.0_x64-setup.exe', en: 'Download for Windows', vi: 'T\u1EA3i cho Windows', os: 'Windows' },
      mac_arm: { file: 'Sipping_0.1.0_aarch64.dmg', en: 'Download for macOS', vi: 'T\u1EA3i cho macOS', os: 'macOS (Apple Silicon)' },
      mac_intel: { file: 'Sipping_0.1.0_x64.dmg', en: 'Download for macOS', vi: 'T\u1EA3i cho macOS', os: 'macOS (Intel)' },
      linux: { file: 'Sipping_0.1.0_amd64.AppImage', en: 'Download for Linux', vi: 'T\u1EA3i cho Linux', os: 'Linux' },
    };

    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('win')) return 'windows';
      if (ua.includes('mac')) {
        try {
          const gl = document.createElement('canvas').getContext('webgl');
          if ((gl?.getParameter(gl.UNMASKED_RENDERER_WEBGL) || '').includes('Apple')) return 'mac_arm';
        } catch(e) {}
        return 'mac_intel';
      }
      if (ua.includes('linux')) return 'linux';
      return 'windows';
    }

    const detectedOS = detectOS();

    function applyDownload() {
      const dl = DOWNLOADS[detectedOS];
      const s = STRINGS[lang];
      document.getElementById('main-download').href = BASE + dl.file;
      document.getElementById('dl-text').textContent = dl[lang];
      document.getElementById('os-label').textContent = s.detected + dl.os;
    }

    function toggleOther() {
      document.getElementById('other-platforms').classList.toggle('show');
    }

    // ── Lightbox ──
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('show');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // Init
    applyLang();
  </script>
</body>
</html>
