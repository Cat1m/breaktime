<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sipping — Keep sipping, stay hydrated</title>
  <meta name="description" content="A gentle break reminder app that helps you stay hydrated and healthy. Free, open-source, cross-platform.">
  <meta property="og:title" content="Sipping — Break Reminder & Hydration App">
  <meta property="og:description" content="Fullscreen break overlays, custom sounds, idle detection. Free & open-source.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cat1m.github.io/breaktime">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #e6f4fb;
      --bg-ocean: #cce8f7;
      --glass: rgba(255, 255, 255, 0.45);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-hover: rgba(255, 255, 255, 0.6);
      --text: #1a3a4a;
      --text-muted: #4a7a8f;
      --primary: #0ea5e9;
      --primary-glow: rgba(14, 165, 233, 0.3);
      --accent: #06d6a0;
      --water-light: #0284c7;
      --water-mid: #0891b2;
      --water-deep: #0369a1;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated water background ── */
    .water-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: linear-gradient(170deg, #d4eef9 0%, #b8e2f6 30%, #a0d8f2 60%, #c2e6f8 100%);
    }

    .water-bg::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, rgba(6, 214, 160, 0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(56, 189, 248, 0.12) 0%, transparent 40%);
      animation: drift 20s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -1%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
    }

    /* Floating bubbles */
    .bubbles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      bottom: -80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(14, 165, 233, 0.2), rgba(56, 189, 248, 0.06));
      border: 1px solid rgba(14, 165, 233, 0.15);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(0.5); opacity: 0; }
    }

    /* Wave at the bottom */
    .wave-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 0;
      pointer-events: none;
      height: 200px;
    }

    .wave {
      position: absolute;
      bottom: 0;
      left: -5%;
      width: 110%;
      height: 100%;
    }

    .wave path { fill: rgba(14, 165, 233, 0.1); }
    .wave:nth-child(2) path { fill: rgba(56, 189, 248, 0.08); }
    .wave:nth-child(3) path { fill: rgba(6, 182, 212, 0.06); }

    .wave { animation: wave-sway 8s ease-in-out infinite; }
    .wave:nth-child(2) { animation: wave-sway 10s ease-in-out infinite reverse; }
    .wave:nth-child(3) { animation: wave-sway 12s ease-in-out infinite; }

    @keyframes wave-sway {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-3%); }
    }

    /* ── Layout ── */
    .content { position: relative; z-index: 1; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* ── Glass card mixin ── */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
    }

    /* ── Lang toggle ── */
    .lang-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
    }
    .lang-toggle:hover {
      border-color: var(--primary);
      color: var(--text);
      background: rgba(255,255,255,0.7);
    }

    /* ── Hero ── */
    .hero { text-align: center; padding: 100px 0 70px; }
    .hero-icon {
      font-size: 80px;
      margin-bottom: 20px;
      display: block;
      filter: drop-shadow(0 0 30px rgba(14, 165, 233, 0.35));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #0369a1 0%, #0284c7 40%, #0ea5e9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .tagline {
      font-size: 22px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 300;
    }

    .hero .description {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 540px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--water-deep));
      color: white;
      box-shadow: 0 4px 20px var(--primary-glow);
    }
    .btn-primary:hover {
      text-decoration: none;
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--primary-glow);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.6);
      padding: 10px 20px;
      font-size: 14px;
    }
    .btn-ghost:hover {
      border-color: var(--primary);
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.65);
    }
    .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 10px; }

    .download-group { margin-bottom: 16px; }
    .os-label { font-size: 13px; color: var(--text-muted); margin-top: 12px; }

    .trust-note {
      margin-top: 24px;
      padding: 16px 22px;
      background: rgba(234, 179, 8, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(234, 179, 8, 0.25);
      border-radius: 14px;
      font-size: 13px;
      color: #92710a;
      line-height: 1.6;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
    .trust-note summary { cursor: pointer; font-weight: 600; text-align: center; list-style: none; }
    .trust-note summary::-webkit-details-marker { display: none; }
    .trust-note .steps { margin-top: 10px; color: #6b5a1e; }
    .trust-note .steps strong { color: #4a3d10; }

    .other-toggle {
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
      margin-top: 14px;
      font-family: inherit;
      transition: color 0.3s;
    }
    .other-toggle:hover { color: var(--primary); }

    .other-platforms { display: none; margin-top: 20px; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .other-platforms.show { display: flex; }

    /* ── Section divider ── */
    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.2), transparent);
      margin: 0 auto;
      max-width: 600px;
    }

    /* ── Screenshots ── */
    .screenshots { padding: 70px 0; }
    .screenshots h2 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 36px;
      font-weight: 700;
    }
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .screenshots-grid img {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: all 0.3s;
      background: var(--glass);
    }
    .screenshots-grid img:hover {
      transform: scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 8px 32px rgba(14, 165, 233, 0.2);
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(10, 50, 80, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }

    /* ── Hydration section ── */
    .hydration { padding: 70px 0; }
    .hydration h2 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .hydration .section-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 16px;
      max-width: 560px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .hydration-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .hydration-card {
      padding: 28px 22px;
      text-align: center;
      transition: all 0.3s;
    }
    .hydration-card:hover {
      background: rgba(255,255,255,0.65);
      border-color: rgba(14, 165, 233, 0.3);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(14, 165, 233, 0.12);
    }

    .hydration-card .card-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.25));
    }
    .hydration-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--water-light);
    }
    .hydration-card p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .water-fact {
      margin-top: 36px;
      padding: 24px 28px;
      text-align: center;
      background: rgba(14, 165, 233, 0.08);
      border: 1px solid rgba(14, 165, 233, 0.18);
    }
    .water-fact p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 640px;
      margin: 0 auto;
    }
    .water-fact strong { color: var(--water-light); }

    /* ── Features ── */
    .features { padding: 70px 0; }
    .features h2 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 40px;
      font-weight: 700;
    }
    .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    .feature-card {
      padding: 26px;
      transition: all 0.3s;
    }
    .feature-card:hover {
      background: rgba(255,255,255,0.65);
      border-color: rgba(14, 165, 233, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(14, 165, 233, 0.12);
    }
    .feature-card .icon {
      font-size: 28px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 8px rgba(14, 165, 233, 0.2));
    }
    .feature-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .feature-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    /* ── Footer ── */
    footer { padding: 50px 0 40px; text-align: center; }
    .footer-links {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--text-muted);
      font-size: 14px;
      transition: color 0.3s;
    }
    .footer-links a:hover { color: var(--primary); }
    .footer-tagline { font-size: 13px; color: var(--text-muted); font-style: italic; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hydration-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .hero { padding: 60px 0 50px; }
      .hero h1 { font-size: 36px; }
      .hero-icon { font-size: 56px; }
      .hero .tagline { font-size: 18px; }
      .features-grid,
      .screenshots-grid { grid-template-columns: 1fr; }
      .hydration-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    // ── Bubble generator ──
    (function generateBubbles() {
      const container = document.getElementById('bubbles');
      const count = 18;
      for (let i = 0; i < count; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = Math.random() * 40 + 10;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = Math.random() * 100 + '%';
        bubble.style.animationDuration = Math.random() * 12 + 10 + 's';
        bubble.style.animationDelay = Math.random() * 15 + 's';
        container.appendChild(bubble);
      }
    })();

    // ── i18n ──
    const STRINGS = {
      en: {
        tagline: 'Keep sipping, stay hydrated',
        description: 'A gentle break reminder that shows fullscreen overlays when it\'s time to rest. Custom sounds, background images, idle detection \u2014 simple and distraction-free.',
        allPlatforms: 'All platforms \u25BE',
        trustTitle: '\u26A0 Windows or macOS showing a warning?',
        trustSteps: 'Sipping is open-source and free, but not yet code-signed \u2014 so your OS may show a security warning. This is normal for new indie apps.<br><br><strong>Windows:</strong> Click "More info" \u2192 "Run anyway"<br><strong>macOS:</strong> Right-click the app \u2192 "Open" \u2192 "Open" again<br><br>You can <a href="https://github.com/Cat1m/breaktime">inspect the source code</a> anytime.',
        screenshotsTitle: 'See it in action',

    let lang = localStorage.getItem('sipping-lang') || (navigator.language.startsWith('vi') ? 'vi' : 'en');

    function applyLang() {
      const s = STRINGS[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (s[key]) el.textContent = s[key];
      });
      // HTML content
      document.getElementById('trust-steps').innerHTML = s.trustSteps;
      document.querySelector('.water-fact p').innerHTML = s.waterFact;
      // Lang toggle button
      document.getElementById('lang-toggle').textContent = s.langBtn;
      // Download button + OS label
      applyDownload();
      document.documentElement.lang = lang;
      localStorage.setItem('sipping-lang', lang);
    }

    function toggleLang() {
      lang = lang === 'en' ? 'vi' : 'en';
      applyLang();
    }

    // ── Download detection ──
    const BASE = 'https://github.com/Cat1m/breaktime/releases/download/v0.1.0/';
    const DOWNLOADS = {
      windows: { file: 'Sipping_0.1.0_x64-setup.exe', en: 'Download for Windows', vi: 'T\u1EA3i cho Windows', os: 'Windows' },
      mac_arm: { file: 'Sipping_0.1.0_aarch64.dmg', en: 'Download for macOS', vi: 'T\u1EA3i cho macOS', os: 'macOS (Apple Silicon)' },
      mac_intel: { file: 'Sipping_0.1.0_x64.dmg', en: 'Download for macOS', vi: 'T\u1EA3i cho macOS', os: 'macOS (Intel)' },
      linux: { file: 'Sipping_0.1.0_amd64.AppImage', en: 'Download for Linux', vi: 'T\u1EA3i cho Linux', os: 'Linux' },
    };

    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('win')) return 'windows';
      if (ua.includes('mac')) {
        try {
          const gl = document.createElement('canvas').getContext('webgl');
          if ((gl?.getParameter(gl.UNMASKED_RENDERER_WEBGL) || '').includes('Apple')) return 'mac_arm';
        } catch(e) {}
        return 'mac_intel';
      }
      if (ua.includes('linux')) return 'linux';
      return 'windows';
    }

    const detectedOS = detectOS();

    function applyDownload() {
      const dl = DOWNLOADS[detectedOS];
      const s = STRINGS[lang];
      document.getElementById('main-download').href = BASE + dl.file;
      document.getElementById('dl-text').textContent = dl[lang];
      document.getElementById('os-label').textContent = s.detected + dl.os;
    }

    function toggleOther() {
      document.getElementById('other-platforms').classList.toggle('show');
    }

    // ── Lightbox ──
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('show');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // Init
    applyLang();
  </script>
